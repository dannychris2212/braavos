<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0a0a0f"/>

  <!-- B wireframe elegante -->
  <line x1="140" y1="120" x2="140" y2="392" stroke="#c9a84c" stroke-width="20" stroke-linecap="round"/>
  <path d="M140 120 Q300 120 300 186 Q300 252 140 252" fill="none" stroke="#c9a84c" stroke-width="20" stroke-linecap="round"/>
  <path d="M140 252 Q318 252 318 318 Q318 392 140 392" fill="none" stroke="#c9a84c" stroke-width="20" stroke-linecap="round"/>

  <!-- área preenchida sob a linha de tendência -->
  <polygon points="175,375 395,155 395,175 195,375" fill="#c9a84c" opacity="0.12"/>

  <!-- linha de tendência sólida -->
  <line x1="175" y1="375" x2="395" y2="155" stroke="#c9a84c" stroke-width="7" stroke-linecap="round"/>

  <!-- ponto superior (destaque) -->
  <circle cx="395" cy="155" r="12" fill="#c9a84c"/>
  <!-- brilho interno no ponto -->
  <circle cx="395" cy="155" r="5" fill="#0a0a0f" opacity="0.4"/>

  <!-- ponto inferior (origem) -->
  <circle cx="175" cy="375" r="7" fill="#c9a84c" opacity="0.5"/>
</svg>
